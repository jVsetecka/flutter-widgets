function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function CategoryPill({ cat, small }) {
  if (!cat) return null;
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 4,
      background: (CAT_COLORS[cat] || "#666") + "18",
      color: CAT_COLORS[cat] || "#666",
      padding: small ? "2px 8px" : "4px 12px", borderRadius: 99,
      fontSize: small ? 11 : 12, fontWeight: 600,
      border: `1px solid ${(CAT_COLORS[cat] || "#666")}30`,
      whiteSpace: "nowrap",
    }}>
      <span>{CAT_EMOJI[cat] || ""}</span> {cat}
    </span>
  );
}

// --- QUIZ MODE ---
function QuizMode({ widgets, selectedCats }) {
  const pool = useMemo(
    () => widgets.filter(w => selectedCats.includes(w.c)),
    [widgets, selectedCats]
  );
  const [queue, setQueue] = useState([]);
  const [current, setCurrent] = useState(null);
  const [options, setOptions] = useState([]);
  const [selected, setSelected] = useState(null);
  const [score, setScore] = useState({ correct: 0, total: 0 });
  const [questionType, setQuestionType] = useState("desc");
  const poolRef = useRef(pool);
  poolRef.current = pool;

  const generateQuestion = useCallback(() => {
    const p = poolRef.current;
    if (p.length < 4) return;
    const q = shuffle(p);
    const item = q[0];
    const type = Math.random() > 0.5 ? "desc" : "usage";
    setQuestionType(type);
    const wrongPool = p.filter(w => w.w !== item.w);
    const wrongs = shuffle(wrongPool).slice(0, 3);
    const opts = shuffle([item, ...wrongs]);
    setCurrent(item);
    setOptions(opts);
    setSelected(null);
    setQueue(q.slice(1));
  }, []);

  // Reset when categories change
  useEffect(() => {
    setQueue([]);
    setSelected(null);
    setCurrent(null);
    setOptions([]);
    if (pool.length >= 4) {
      // Small delay to ensure poolRef is updated
      setTimeout(() => generateQuestion(), 0);
    }
  }, [selectedCats, generateQuestion, pool.length]);

  if (pool.length < 4) return (
    <div style={{ textAlign: "center", padding: 40, color: "#94a3b8" }}>
      Vyber aspo\u0148 jednu kategorii se 4+ widgety
    </div>
  );

  const handleSelect = (w) => {
    if (selected) return;
    setSelected(w.w);
    setScore(s => ({
      correct: s.correct + (w.w === current.w ? 1 : 0),
      total: s.total + 1,
    }));
  };

  const handleNext = () => {
    if (queue.length > 0) {
      const item = queue[0];
      const rest = queue.slice(1);
      const type = Math.random() > 0.5 ? "desc" : "usage";
      setQuestionType(type);
      const wrongPool = pool.filter(w => w.w !== item.w);
      const wrongs = shuffle(wrongPool).slice(0, 3);
      const opts = shuffle([item, ...wrongs]);
      setCurrent(item);
      setOptions(opts);
      setSelected(null);
      setQueue(rest);
    } else {
      generateQuestion();
    }
  };

  const pct = score.total ? Math.round((score.correct / score.total) * 100) : 0;

  return (
    <div style={{ maxWidth: 640, margin: "0 auto" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <div style={{ display: "flex", gap: 16, fontSize: 14, color: "#64748b" }}>
          <span style={{ color: "#10b981", fontWeight: 700 }}>{score.correct} \u2713</span>
          <span style={{ color: "#ef4444", fontWeight: 700 }}>{score.total - score.correct} \u2717</span>
          <span style={{ fontWeight: 600 }}>{pct}%</span>
        </div>
        <button onClick={() => setScore({ correct: 0, total: 0 })} style={{
          background: "none", border: "none", color: "#94a3b8", cursor: "pointer", fontSize: 12,
        }}>Reset</button>
      </div>

      {current && (
        <>
          <div style={{
            background: "#f8fafc", borderRadius: 16, padding: 28,
            border: "1px solid #e2e8f0", marginBottom: 24,
          }}>
            <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 1, color: "#94a3b8", marginBottom: 8 }}>
              {questionType === "desc" ? "\ud83d\udcd6 Popis widgetu" : "\ud83c\udfaf Typick\u00e9 pou\u017eit\u00ed"}
            </div>
            <div style={{ fontSize: 17, lineHeight: 1.6, color: "#1e293b", fontWeight: 500 }}>
              {questionType === "desc" ? current.d : current.u}
            </div>
            <div style={{ marginTop: 12 }}>
              <CategoryPill cat={current.c} small />
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {options.map((opt) => {
              const isCorrect = opt.w === current.w;
              const isSelected = selected === opt.w;
              let bg = "white";
              let border = "#e2e8f0";
              let color = "#334155";
              if (selected) {
                if (isCorrect) { bg = "#ecfdf5"; border = "#10b981"; color = "#065f46"; }
                else if (isSelected) { bg = "#fef2f2"; border = "#ef4444"; color = "#991b1b"; }
                else { bg = "#f8fafc"; border = "#e2e8f0"; color = "#94a3b8"; }
              }
              return (
                <button key={opt.w} onClick={() => handleSelect(opt)} style={{
                  background: bg, border: `2px solid ${border}`, borderRadius: 12,
                  padding: "14px 16px", cursor: selected ? "default" : "pointer",
                  fontSize: 15, fontWeight: 600, color, textAlign: "left",
                  transition: "all 0.15s", fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
                }}>
                  {opt.w}
                </button>
              );
            })}
          </div>

          {selected && (
            <div style={{ textAlign: "center", marginTop: 20 }}>
              <button onClick={handleNext} style={{
                background: "#2563eb", color: "white", border: "none", borderRadius: 10,
                padding: "10px 28px", fontSize: 14, fontWeight: 600, cursor: "pointer",
              }}>
                \u27a1\ufe0f Dal\u0161\u00ed ot\u00e1zka
              </button>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// --- FLASHCARDS MODE ---
function FlashcardsMode({ widgets, selectedCats }) {
  const pool = useMemo(
    () => shuffle(widgets.filter(w => selectedCats.includes(w.c))),
    [widgets, selectedCats]
  );
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [known, setKnown] = useState(0);
  const [unknown, setUnknown] = useState(0);

  // Reset index when categories change
  useEffect(() => {
    setIdx(0);
    setFlipped(false);
  }, [selectedCats]);

  if (!pool.length) return <div style={{ textAlign: "center", padding: 40, color: "#94a3b8" }}>Vyber kategorii</div>;

  const card = pool[idx % pool.length];

  const next = (isKnown) => {
    if (isKnown) setKnown(k => k + 1); else setUnknown(u => u + 1);
    setFlipped(false);
    setTimeout(() => setIdx(i => i + 1), 100);
  };

  return (
    <div style={{ maxWidth: 480, margin: "0 auto" }}>
      <div style={{ display: "flex", justifyContent: "center", gap: 20, marginBottom: 20, fontSize: 14, color: "#64748b" }}>
        <span>{idx % pool.length + 1}/{pool.length}</span>
        <span style={{ color: "#10b981" }}>\u2713 {known}</span>
        <span style={{ color: "#ef4444" }}>\u2717 {unknown}</span>
      </div>

      <div onClick={() => setFlipped(f => !f)} style={{
        background: flipped ? "#f0fdf4" : "white",
        borderRadius: 20, padding: 32, minHeight: 240,
        border: `2px solid ${flipped ? "#86efac" : "#e2e8f0"}`,
        cursor: "pointer", display: "flex", flexDirection: "column",
        justifyContent: "center", alignItems: "center", textAlign: "center",
        transition: "all 0.2s",
      }}>
        {!flipped ? (
          <>
            <div style={{ fontSize: 11, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1, marginBottom: 16 }}>
              Widget
            </div>
            <div style={{ fontSize: 28, fontWeight: 800, color: "#0f172a", fontFamily: "'JetBrains Mono', monospace" }}>
              {card.w}
            </div>
            <div style={{ marginTop: 12 }}><CategoryPill cat={card.c} small /></div>
            <div style={{ fontSize: 12, color: "#cbd5e1", marginTop: 20 }}>Klikni pro odpov\u011b\u010f</div>
          </>
        ) : (
          <>
            <div style={{ fontSize: 16, fontWeight: 600, color: "#065f46", marginBottom: 12 }}>{card.w}</div>
            <div style={{ fontSize: 15, lineHeight: 1.6, color: "#334155", marginBottom: 10 }}>{card.d}</div>
            <div style={{ fontSize: 13, color: "#64748b", fontStyle: "italic" }}>\ud83c\udfaf {card.u}</div>
          </>
        )}
      </div>

      {flipped && (
        <div style={{ display: "flex", gap: 12, justifyContent: "center", marginTop: 16 }}>
          <button onClick={() => next(false)} style={{
            background: "#fef2f2", color: "#dc2626", border: "2px solid #fecaca",
            borderRadius: 10, padding: "10px 24px", fontSize: 14, fontWeight: 600, cursor: "pointer",
          }}>
            \u274c Neum\u00edm
          </button>
          <button onClick={() => next(true)} style={{
            background: "#ecfdf5", color: "#16a34a", border: "2px solid #bbf7d0",
            borderRadius: 10, padding: "10px 24px", fontSize: 14, fontWeight: 600, cursor: "pointer",
          }}>
            \u2705 Um\u00edm
          </button>
        </div>
      )}
    </div>
  );
}

// --- PROMPT MODE ---
function PromptMode({ widgets, selectedCats }) {
  const pool = useMemo(
    () => shuffle(widgets.filter(w => selectedCats.includes(w.c))),
    [widgets, selectedCats]
  );
  const [idx, setIdx] = useState(0);
  const [revealed, setRevealed] = useState(false);

  // Reset index when categories change
  useEffect(() => {
    setIdx(0);
    setRevealed(false);
  }, [selectedCats]);

  if (!pool.length) return <div style={{ textAlign: "center", padding: 40, color: "#94a3b8" }}>Vyber kategorii</div>;

  const card = pool[idx % pool.length];

  return (
    <div style={{ maxWidth: 560, margin: "0 auto" }}>
      <div style={{ fontSize: 12, color: "#94a3b8", textAlign: "center", marginBottom: 16 }}>
        {idx % pool.length + 1}/{pool.length}
      </div>
      <div style={{
        background: "#fefce8", borderRadius: 16, padding: 24,
        border: "2px solid #fde68a", marginBottom: 16,
      }}>
        <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 1, color: "#a16207", marginBottom: 8 }}>
          \ud83e\udd16 AI Prompt
        </div>
        <div style={{ fontSize: 16, lineHeight: 1.6, color: "#713f12", fontWeight: 500 }}>
          {card.p}
        </div>
      </div>

      <div style={{ textAlign: "center", marginBottom: 16, fontSize: 14, color: "#64748b" }}>
        Jak\u00fd widget by AI m\u011blo pou\u017e\u00edt?
      </div>

      {!revealed ? (
        <div style={{ textAlign: "center" }}>
          <button onClick={() => setRevealed(true)} style={{
            background: "#f59e0b", color: "white", border: "none", borderRadius: 10,
            padding: "10px 28px", fontSize: 14, fontWeight: 600, cursor: "pointer",
          }}>
            \ud83d\udc41\ufe0f Zobrazit odpov\u011b\u010f
          </button>
        </div>
      ) : (
        <>
          <div style={{
            background: "#f0fdf4", borderRadius: 16, padding: 20,
            border: "2px solid #86efac", textAlign: "center",
          }}>
            <div style={{ fontSize: 24, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", color: "#065f46" }}>
              {card.w}
            </div>
            <div style={{ marginTop: 8 }}><CategoryPill cat={card.c} /></div>
            <div style={{ fontSize: 14, color: "#334155", marginTop: 12, lineHeight: 1.5 }}>{card.d}</div>
          </div>
          <div style={{ textAlign: "center", marginTop: 16 }}>
            <button onClick={() => { setRevealed(false); setIdx(i => i + 1); }} style={{
              background: "#2563eb", color: "white", border: "none", borderRadius: 10,
              padding: "10px 28px", fontSize: 14, fontWeight: 600, cursor: "pointer",
            }}>
              \u27a1\ufe0f Dal\u0161\u00ed prompt
            </button>
          </div>
        </>
      )}
    </div>
  );
}

// --- CATEGORY FILTER ---
function CategoryFilter({ selected, onChange }) {
  const toggleAll = () => {
    if (selected.length === CATEGORIES.length) onChange([]);
    else onChange([...CATEGORIES]);
  };

  return (
    <div style={{ marginBottom: 24 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
        <span style={{ fontSize: 13, color: "#64748b", fontWeight: 600 }}>Kategorie:</span>
        <button onClick={toggleAll} style={{
          background: "none", border: "1px solid #cbd5e1", borderRadius: 6,
          padding: "2px 10px", fontSize: 11, color: "#64748b", cursor: "pointer",
        }}>
          {selected.length === CATEGORIES.length ? "Odzna\u010dit v\u0161e" : "Vybrat v\u0161e"}
        </button>
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
        {CATEGORIES.map(cat => {
          const active = selected.includes(cat);
          return (
            <button key={cat} onClick={() => {
              if (active) onChange(selected.filter(c => c !== cat));
              else onChange([...selected, cat]);
            }} style={{
              display: "inline-flex", alignItems: "center", gap: 4,
              background: active ? (CAT_COLORS[cat] || "#666") + "18" : "#f8fafc",
              color: active ? (CAT_COLORS[cat] || "#666") : "#94a3b8",
              border: `1.5px solid ${active ? (CAT_COLORS[cat] || "#666") + "40" : "#e2e8f0"}`,
              borderRadius: 99, padding: "4px 12px", fontSize: 12, fontWeight: 600,
              cursor: "pointer", transition: "all 0.15s",
              opacity: active ? 1 : 0.6,
            }}>
              {CAT_EMOJI[cat] || ""} {cat}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// --- MAIN APP ---
const MODES = [
  { id: "quiz", label: "\ud83c\udfb2 Kv\u00edz", desc: "H\u00e1dej widget podle popisu" },
  { id: "flash", label: "\ud83c\udccf Karti\u010dky", desc: "Obra\u0165 a procvi\u010duj" },
  { id: "prompt", label: "\ud83e\udd16 AI Prompt", desc: "Poznej widget z promptu" },
];

function App() {
  const [mode, setMode] = useState("quiz");
  const [selectedCats, setSelectedCats] = useState([...CATEGORIES]);

  return (
    <div style={{ minHeight: "100vh", padding: "20px 16px", fontFamily: "'Segoe UI', system-ui, -apple-system, sans-serif" }}>
      <div style={{ maxWidth: 700, margin: "0 auto" }}>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ fontSize: 28, fontWeight: 900, color: "#0f172a" }}>
            \ud83d\udca0 Flutter Widget Drill
          </div>
          <div style={{ fontSize: 14, color: "#64748b", marginTop: 4 }}>
            134 widget\u016f \u00b7 17 kategori\u00ed \u00b7 3 m\u00f3dy procvi\u010dov\u00e1n\u00ed
          </div>
        </div>

        <div style={{ display: "flex", gap: 8, justifyContent: "center", marginBottom: 20, flexWrap: "wrap" }}>
          {MODES.map(m => (
            <button key={m.id} onClick={() => setMode(m.id)} style={{
              background: mode === m.id ? "#2563eb" : "transparent",
              color: mode === m.id ? "white" : "#64748b",
              border: `2px solid ${mode === m.id ? "#2563eb" : "#e2e8f0"}`,
              borderRadius: 10, padding: "8px 16px", cursor: "pointer",
              fontSize: 13, fontWeight: 700, transition: "all 0.15s",
            }}>
              <div>{m.label}</div>
              <div style={{ fontSize: 10, fontWeight: 400, opacity: 0.8 }}>{m.desc}</div>
            </button>
          ))}
        </div>

        <CategoryFilter selected={selectedCats} onChange={setSelectedCats} />

        {mode === "quiz" && <QuizMode widgets={ALL_WIDGETS} selectedCats={selectedCats} />}
        {mode === "flash" && <FlashcardsMode widgets={ALL_WIDGETS} selectedCats={selectedCats} />}
        {mode === "prompt" && <PromptMode widgets={ALL_WIDGETS} selectedCats={selectedCats} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
